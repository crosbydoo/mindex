<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Mindex - Psychology Research Index</title>
    <meta
      name="description"
      content="Effortlessly search and explore a curated collection of psychology journals and literature, designed for students seeking relevant research with ease."
    />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA / installable web app -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mindex" />
    <meta name="application-name" content="Mindex" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#2e4157" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Outfit:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #ffffff;
      }
      #root {
        height: 100%;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #ffffff;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #app-splash[data-hide="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash .splash-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.1rem;
        animation: splash-in 0.55s ease both;
      }
      #app-splash .splash-logo {
        width: 88px;
        height: 88px;
        border-radius: 20px;
        background: #2e4157;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(46, 65, 87, 0.18);
      }
      #app-splash .splash-logo svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      #app-splash .splash-name {
        margin: 0;
        font-family: "Lora", Georgia, serif;
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.03em;
        color: #2e4157;
        line-height: 1;
        text-transform: lowercase;
      }
      @keyframes splash-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-label="Loading Mindex">
      <div class="splash-brand">
        <div class="splash-logo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img">
            <rect width="32" height="32" rx="7" ry="7" fill="#2e4157" />
            <g
              fill="none"
              stroke="#ffffff"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              transform="translate(6 3) scale(0.9)"
            >
              <path d="M12 3v18M6 3C6 9.627 8.686 14 12 14c3.314 0 6-4.373 6-11" />
              <path d="M8 21h8" />
            </g>
          </svg>
        </div>
        <p class="splash-name">mindex</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
