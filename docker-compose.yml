services:
  postgres:
    image: postgres:16-alpine
    container_name: mindex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindex
      POSTGRES_PASSWORD: mindex_local_dev
      POSTGRES_DB: mindex
    ports:
      - "5432:5432"
    volumes:
      - mindex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindex -d mindex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mindex_pgdata:
